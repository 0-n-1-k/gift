<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fdf6ee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Happy Birthday Pakhi🥺</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream:        #fdf8f2;
      --rose:         #c4506a;
      --rose-light:   #e8829a;
      --blush:        #f0c0cc;
      --mauve:        #7a4a66;
      --mauve-light:  #b07898;
      --gold:         #d4a045;
      --gold-light:   #f0c870;
      --dark:         #18100e;
      --glass:        rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.13);
      --t-smooth:     0.65s cubic-bezier(0.4,0,0.2,1);
      --t-fast:       0.25s cubic-bezier(0.4,0,0.2,1);
      --r-lg:         28px;
    }

    body {
      width: 100%; height: 100vh; height: 100dvh;
      overflow: hidden;
      font-family: 'Jost', sans-serif;
      color: var(--dark);
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      position: relative;
    }

    #bg-layer {
      position: fixed; inset: 0; z-index: -2; pointer-events: none;
      background: radial-gradient(ellipse at 50% 30%, #fff9f3 0%, #fdf6ee 55%, #f7e8da 100%);
      transition: background 1.3s ease;
    }

    .petal {
      position: fixed; pointer-events: none;
      z-index: 0; will-change: transform, opacity;
      border-radius: 50% 0 50% 50%;
    }

    /* ── GATE OVERLAY ── */
    #gate-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: radial-gradient(ellipse at 50% 30%, #fff9f3 0%, #fdf6ee 55%, #f7e8da 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    #gate-overlay.hidden { opacity: 0; visibility: hidden; transition: opacity var(--t-smooth), visibility var(--t-smooth); }
    .gate-card { max-width: 320px; display: flex; flex-direction: column; align-items: center; }
    .gate-btn {
      margin-top: 30px; padding: 16px 42px; min-height: 48px;
      font-family: 'Jost', sans-serif; font-size: 0.95rem; font-weight: 400;
      letter-spacing: 2px; color: #fff; text-transform: uppercase;
      background: linear-gradient(135deg, var(--rose) 0%, var(--mauve) 100%);
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 10px 28px rgba(196,80,106,0.35);
      transition: transform var(--t-fast), box-shadow var(--t-fast);
    }
    .gate-btn:active { transform: scale(0.96); box-shadow: 0 4px 12px rgba(196,80,106,0.2); }

    /* Focus-visible for all interactive elements */
    .gate-btn:focus-visible, .play-btn:focus-visible,
    .skip-btn:focus-visible, #fs-btn:focus-visible, #cake-area:focus-visible {
      outline: 3px solid var(--rose); outline-offset: 4px;
    }

    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transform: translateY(28px) scale(0.98);
      transition: opacity var(--t-smooth), visibility var(--t-smooth), transform var(--t-smooth);
      padding: 20px; z-index: 10;
    }
    .screen.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

    /* ── SCREEN 1 ── */
    #screen-1 { background: transparent; }
    .s1-eyebrow {
      font-size: clamp(0.6rem, 2.8vw, 0.85rem); font-weight: 300; letter-spacing: 7px;
      text-transform: uppercase; color: var(--mauve-light); margin-bottom: 6px; text-align: center;
    }
    .s1-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 4.6rem); font-weight: 700; line-height: 1.1;
      text-align: center; margin-bottom: 18px; color: var(--dark);
    }
    .s1-name em { color: var(--rose); font-style: italic; }

    .cake-area {
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; position: relative;
    }
    .cake-float { animation: float 4s ease-in-out infinite; will-change: transform; }
    .cake-area:active .cake-float { transform: scale(0.94); }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-9px) rotate(0.4deg); }
    }

    /* ── FLAMES — enhanced: glow + dual sway + blow-lean ── */
    .fl {
      will-change: transform, opacity, filter;
      transform-box: fill-box; transform-origin: 50% 100%;
    }
    .fl-1  { animation: flk1 0.14s ease-in-out infinite alternate, sway1 2.1s ease-in-out infinite; animation-delay: 0s,    0.0s; }
    .fl-2  { animation: flk2 0.17s ease-in-out infinite alternate, sway2 1.9s ease-in-out infinite; animation-delay: 0.03s, 0.2s; }
    .fl-3  { animation: flk1 0.13s ease-in-out infinite alternate, sway1 2.3s ease-in-out infinite; animation-delay: 0.07s, 0.4s; }
    .fl-4  { animation: flk2 0.18s ease-in-out infinite alternate, sway2 2.0s ease-in-out infinite; animation-delay: 0.01s, 0.1s; }
    .fl-5  { animation: flk1 0.15s ease-in-out infinite alternate, sway1 2.2s ease-in-out infinite; animation-delay: 0.06s, 0.5s; }
    .fl-6  { animation: flk2 0.12s ease-in-out infinite alternate, sway2 1.8s ease-in-out infinite; animation-delay: 0.09s, 0.3s; }
    .fl-7  { animation: flk1 0.16s ease-in-out infinite alternate, sway1 2.4s ease-in-out infinite; animation-delay: 0.04s, 0.6s; }
    .fl-8  { animation: flk2 0.14s ease-in-out infinite alternate, sway2 2.1s ease-in-out infinite; animation-delay: 0.08s, 0.2s; }
    .fl-9  { animation: flk1 0.19s ease-in-out infinite alternate, sway1 1.9s ease-in-out infinite; animation-delay: 0.02s, 0.7s; }
    .fl-10 { animation: flk2 0.13s ease-in-out infinite alternate, sway2 2.3s ease-in-out infinite; animation-delay: 0.05s, 0.4s; }
    .fl-11 { animation: flk1 0.15s ease-in-out infinite alternate, sway1 2.0s ease-in-out infinite; animation-delay: 0.00s, 0.0s; }
    .fl-12 { animation: flk2 0.16s ease-in-out infinite alternate, sway2 2.2s ease-in-out infinite; animation-delay: 0.07s, 0.3s; }
    .fl-13 { animation: flk1 0.14s ease-in-out infinite alternate, sway1 1.8s ease-in-out infinite; animation-delay: 0.03s, 0.5s; }
    .fl-14 { animation: flk2 0.17s ease-in-out infinite alternate, sway2 2.1s ease-in-out infinite; animation-delay: 0.09s, 0.1s; }
    .fl-15 { animation: flk1 0.12s ease-in-out infinite alternate, sway1 2.4s ease-in-out infinite; animation-delay: 0.06s, 0.6s; }
    .fl-16 { animation: flk2 0.18s ease-in-out infinite alternate, sway2 1.9s ease-in-out infinite; animation-delay: 0.02s, 0.2s; }
    .fl-17 { animation: flk1 0.15s ease-in-out infinite alternate, sway1 2.0s ease-in-out infinite; animation-delay: 0.05s, 0.4s; }
    .fl-18 { animation: flk2 0.13s ease-in-out infinite alternate, sway2 2.3s ease-in-out infinite; animation-delay: 0.08s, 0.7s; }
    .fl-19 { animation: flk1 0.16s ease-in-out infinite alternate, sway1 2.1s ease-in-out infinite; animation-delay: 0.01s, 0.3s; }

    @keyframes flk1 {
      0%   { transform: scale(0.90) rotate(-2deg) skewX(-1.5deg); opacity: 0.78; filter: drop-shadow(0 0 2px #ffcc44) drop-shadow(0 0 5px #ff6600); }
      100% { transform: scale(1.08) rotate(2.2deg) skewX(2.5deg);  opacity: 1;    filter: drop-shadow(0 0 5px #ffee88) drop-shadow(0 0 12px #ff8800); }
    }
    @keyframes flk2 {
      0%   { transform: scale(1.06) rotate(1.5deg) skewX(2deg);    opacity: 0.92; filter: drop-shadow(0 0 4px #ffcc44) drop-shadow(0 0 9px #ff8800); }
      100% { transform: scale(0.92) rotate(-2.5deg) skewX(-1.5deg);opacity: 0.72; filter: drop-shadow(0 0 2px #ff9933) drop-shadow(0 0 4px #cc4400); }
    }
    @keyframes sway1 {
      0%,100% {} 25% { transform: translateX(-1.5px); } 75% { transform: translateX(1.5px); }
    }
    @keyframes sway2 {
      0%,100% {} 25% { transform: translateX(1px); }   75% { transform: translateX(-2px); }
    }
    .fl.blow-react { animation: blowLean 0.25s ease-out forwards !important; }
    @keyframes blowLean {
      0%   { transform: scale(1.0) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 8px #ffee88) drop-shadow(0 0 20px #ff6600); }
      40%  { transform: scale(0.6) rotate(25deg) skewX(8deg) translateX(6px); opacity: 0.8; }
      100% { transform: scale(0) rotate(40deg) translateY(-12px); opacity: 0; filter: none; }
    }

    .smoke-particle {
      fill: #a1a1aa; opacity: 0; transform-origin: center; transform-box: fill-box;
      animation: smoke-rise 2s ease-out forwards;
    }
    @keyframes smoke-rise {
      0%   { transform: translate(0,0) scale(0.3); opacity: 0.6; }
      40%  { opacity: 0.3; }
      100% { transform: translate(var(--dx),var(--dy)) scale(2.2); opacity: 0; }
    }

    /* Mic bar — repositioned below tap-hint with standard spacing margins */
    #mic-bar-wrap {
      margin-top: 14px;
      width: 140px; height: 6px; background: rgba(196,80,106,0.15);
      border-radius: 4px; overflow: hidden; opacity: 0; transition: opacity 0.4s;
    }
    #mic-bar-wrap.visible { opacity: 1; }
    #mic-bar-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, var(--rose-light), var(--gold));
      border-radius: 4px; transform: scaleX(0); transform-origin: left;
      transition: transform 0.08s linear;
    }

    .tap-hint {
      margin-top: 18px; font-size: clamp(0.72rem, 2.8vw, 0.85rem);
      font-weight: 300; letter-spacing: 1.5px; color: var(--mauve);
      background: rgba(200,80,106,0.09); padding: 10px 24px; border-radius: 24px;
      text-align: center; animation: hint-pulse 2.2s ease-in-out infinite;
      max-width: 88vw; transition: all var(--t-fast);
    }
    .tap-hint.wished { background: rgba(212,160,69,0.14); color: var(--gold); animation: none; }
    @keyframes hint-pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

    /* ── SCREEN 2 ── */
    #screen-2 { color: var(--cream); }
    .glass-card {
      background: var(--glass);
      -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); padding: clamp(24px, 6vw, 44px);
      border-radius: var(--r-lg); text-align: center; width: min(400px, 92vw);
      box-shadow: 0 24px 60px rgba(0,0,0,0.36);
    }
    .card-eyebrow { font-size: clamp(0.65rem, 2.8vw, 0.8rem); font-weight: 300; letter-spacing: 2px; opacity: 0.85; margin-bottom: 8px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: clamp(1.2rem, 4.5vw, 1.7rem); font-weight: 400; font-style: italic; margin-bottom: 22px; opacity: 0.92; }

    .waveform { display: flex; align-items: flex-end; justify-content: center; gap: 4px; height: 58px; margin: 4px 0 22px; }
    /* scaleY transform — no layout reflow */
    .wb {
      width: 4px; height: 100%; border-radius: 6px;
      transform: scaleY(0.08); transform-origin: bottom;
      transition: transform 0.1s ease-out; will-change: transform; opacity: 0.88;
    }
    .wb:nth-child(3n)   { background: var(--rose); }
    .wb:nth-child(3n+1) { background: var(--blush); }
    .wb:nth-child(3n+2) { background: var(--gold-light); }

    .play-btn {
      width: 68px; height: 68px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: linear-gradient(135deg, var(--rose) 0%, var(--mauve) 100%);
      color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
      margin: 0 auto; transition: all var(--t-fast);
      box-shadow: 0 8px 24px rgba(196,80,106,0.4);
    }
    .play-btn:hover { transform: scale(1.07); }
    .play-btn svg { width: 22px; height: 22px; pointer-events: none; }

    /* scaleX transform for progress — no reflow */
    .audio-progress { width: 100%; height: 4px; background: rgba(255,255,255,0.12); border-radius: 4px; margin-top: 18px; overflow: hidden; }
    .audio-progress-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.25s linear;
    }

    /* 44px min touch target */
    .skip-btn {
      margin-top: 22px; font-size: 0.78rem; font-weight: 300; letter-spacing: 1.5px;
      color: var(--cream); opacity: 0.45; background: none; border: none; cursor: pointer;
      padding: 14px 24px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center;
    }
    #audio-err { color: var(--rose-light); font-size: 12px; margin-top: 8px; min-height: 16px; }

    /* ── SCREEN 3 ── */
    #screen-3 { color: var(--cream); gap: 20px; justify-content: center; }
    .video-wrap {
      width: min(740px, 94vw); aspect-ratio: 16/9;
      background: #000; border-radius: 16px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55); position: relative;
    }
    .video-wrap video { width: 100%; height: 100%; object-fit: contain; display: block; }
    .video-fallback {
      position: absolute; inset: 0; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1e1418; color: var(--blush); text-align: center;
    }
    .video-fallback.show { display: flex; }
    /* 44px touch target */
    #fs-btn {
      position: absolute; bottom: 10px; right: 10px; width: 44px; height: 44px;
      border-radius: 8px; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 20; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    }
    #fs-btn svg { width: 18px; height: 18px; pointer-events: none; fill: currentColor; }
    .finale-text {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(1rem, 3.5vw, 1.3rem); opacity: 0.82; text-align: center; padding: 0 20px;
    }

    /* Orientation handling */
    @media (orientation: portrait) {
      .video-wrap { width: min(98vw, 480px); aspect-ratio: 9/16; }
      .finale-text { font-size: clamp(0.85rem, 3vw, 1.1rem); }
    }
    @media (orientation: landscape) and (max-height: 500px) {
      .video-wrap { width: 96vw; aspect-ratio: unset; height: 88vh; border-radius: 8px; }
      .finale-text { display: none; }
      #screen-3 { gap: 4px; padding: 4px; }
    }

    /* Reduced motion — respects vestibular sensitivity */
    @media (prefers-reduced-motion: reduce) {
      .cake-float, .fl, .tap-hint { animation: none !important; transform: none !important; }
      .petal { display: none !important; }
      #bg-layer { transition: none !important; }
      .wb, .audio-progress-fill, #mic-bar-fill { transition: none !important; }
    }
  </style>
</head>

    <h2 style="font-family:'Playfair Display',serif;font-weight:400;font-style:italic;margin-top:10px;color:#18100e;">
      Hope this year goes better than the last

</div>

    </div>
  </div>

  <p class="tap-hint" id="tap-hint">Mic permission diye phone kache niye fu dio🥺</p>
  <!-- Mic bar shifted here directly below the text -->
  <div id="mic-bar-wrap"><div id="mic-bar-fill"></div></div>
</section>

<section class="screen" id="screen-2" aria-label="Audio surprise screen">
  <div class="glass-card">
    <p class="card-eyebrow">I always wanted to sing a song for you 🥺</p>
    <h2 class="card-title">Though it's not much but here we go</h2>
    <div class="waveform" id="waveform"></div>
    <button class="play-btn" id="play-btn" aria-label="Play audio">
      <svg viewBox="0 0 24 24" fill="currentColor"><path id="play-icon-path" d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="audio-progress"><div class="audio-progress-fill" id="audio-progress-fill"></div></div>
    <audio id="bday-audio" preload="metadata" playsinline></audio>
    <p id="audio-err"></p>
    <button class="skip-btn" id="skip-btn">Skip to surprise →</button>
  </div>
</section>

<section class="screen" id="screen-3" aria-label="Surprise video playback screen">
  <div class="video-wrap" id="video-wrap">
    <video id="bday-video" width="100%" height="100%" playsinline webkit-playsinline controls preload="metadata">
      <source id="video-src" src="" type="video/mp4">
    </video>
    <div class="video-fallback" id="video-fallback">🎬 Surprise video not found.</div>
    <button id="fs-btn" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 24 24"><path id="fs-path" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
  </div>
  <p class="finale-text" id="finale-text"></p>
</section>

<script>
(function () {
  'use strict';

  /* ── CONFIG — edited to target Ayman ── */
  const CONFIG = {
    recipientName:         'Ayman',
    audioPath:             'voice-message.mp3',  // mp3 / wav / m4a / ogg all work
    videoPath:             'surprise-video.mp4',
    finaleText:            'I love you my Ophelia 🥺',
    useMicrophone:         true,
    micThreshold:          45,               // 18=very sensitive, 42=normal, 60=loud room
    extinguishDelay:       3000,
    autoAdvanceAfterAudio: true,
    petalInterval:         290,
    maxPetals:             55,
  };

  /* ── DOM refs ── */
  const bgLayer       = document.getElementById('bg-layer');
  const gateOverlay   = document.getElementById('gate-overlay');
  const gateBtn       = document.getElementById('gate-btn');
  const cakeArea      = document.getElementById('cake-area');
  const flameGroup    = document.getElementById('flame-group');
  const smokeGroup    = document.getElementById('smoke-group');
  const tapHint       = document.getElementById('tap-hint');
  const recipientEl   = document.getElementById('recipient-name');
  const playBtn       = document.getElementById('play-btn');
  const playIconPath  = document.getElementById('play-icon-path');
  const waveformEl    = document.getElementById('waveform');
  const audio         = document.getElementById('bday-audio');
  const audioErr      = document.getElementById('audio-err');
  const progressFill  = document.getElementById('audio-progress-fill');
  const skipBtn       = document.getElementById('skip-btn');
  const bdayVideo     = document.getElementById('bday-video');
  const videoSrc      = document.getElementById('video-src');
  const videoFallback = document.getElementById('video-fallback');
  const finaleTextEl  = document.getElementById('finale-text');
  const micBarWrap    = document.getElementById('mic-bar-wrap');
  const micBarFill    = document.getElementById('mic-bar-fill');
  const videoWrap     = document.getElementById('video-wrap');
  const fsBtn         = document.getElementById('fs-btn');
  const fsPath        = document.getElementById('fs-path');

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ── Init ── */
  if (recipientEl) recipientEl.innerHTML = 'Happy Birthday<br><em>' + CONFIG.recipientName + '</em>';
  if (finaleTextEl) finaleTextEl.textContent = CONFIG.finaleText;

  if (CONFIG.audioPath && audio) {
    const ext = CONFIG.audioPath.split('.').pop().toLowerCase();
    const mimeMap = { mp3:'audio/mpeg', wav:'audio/wav', ogg:'audio/ogg', m4a:'audio/mp4' };
    const srcEl = document.createElement('source');
    srcEl.src = CONFIG.audioPath;
    srcEl.type = mimeMap[ext] || 'audio/mpeg';
    audio.appendChild(srcEl);
    audio.addEventListener('error', () => {
      if (audioErr) audioErr.textContent = 'Voice message failed to load.';
    });
    audio.load();
  }
  if (CONFIG.videoPath && videoSrc && bdayVideo) { videoSrc.src = CONFIG.videoPath; bdayVideo.load(); }

  /* ── State ── */
  let currentScreen  = 1;
  let isExtinguished = false;
  let micRafId       = null;
  let waveRafId      = null;
  let audioCtxRef    = null;
  let audioAnalyser  = null;
  let micStream      = null;

  /* ── Navigation ── */
  function navigateTo(n) {
    if (currentScreen === n) return;
    if (currentScreen === 2 && audio) { audio.pause(); stopWaveform(); }
    if (n === 2 && bgLayer) bgLayer.style.background = 'linear-gradient(135deg,#1a1018 0%,#231520 100%)';
    else if (n === 3 && bgLayer) bgLayer.style.background = 'linear-gradient(135deg,#0d0a0c 0%,#150f12 100%)';
    ['screen-1','screen-2','screen-3'].forEach(id => {
      const s = document.getElementById(id); if (s) s.classList.remove('active');
    });
    const target = document.getElementById('screen-' + n);
    if (target) { void target.offsetWidth; target.classList.add('active'); currentScreen = n; }
    if (n === 2) buildWaveform();
    if (n === 3 && micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  }

  /* ── Petals ── */
  const petalColors = ['#f0bcc8','#e899ac','#c4506a','#fdf6ee','#f0c870'];
  function spawnPetal() {
    if (prefersReducedMotion) return;
    if (document.getElementsByClassName('petal').length >= CONFIG.maxPetals) return;
    const p = document.createElement('div');
    p.className = 'petal';
    const sz = Math.random()*13+7;
    p.style.cssText = `width:${sz}px;height:${sz}px;background:${petalColors[Math.floor(Math.random()*petalColors.length)]};opacity:${(Math.random()*0.5+0.3).toFixed(2)};`;
    p.style.left = Math.random()*window.innerWidth+'px'; p.style.top='-20px';
    const drift=Math.random()*110-55, dur=Math.random()*3500+4500;
    p.animate([
      { transform:'translate3d(0,0,0) rotate(0deg)', opacity:1 },
      { transform:`translate3d(${drift}px,${window.innerHeight+20}px,0) rotate(540deg)`, opacity:0 }
    ],{ duration:dur, easing:'linear' }).onfinish = ()=>p.remove();
    document.body.appendChild(p);
  }

  /* ── Gate button — AudioContext + mic inside same gesture (iOS critical) ── */
  if (gateBtn) {
    gateBtn.addEventListener('click', async () => {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      audioCtxRef = new AudioCtx();
      if (audioCtxRef.state === 'suspended') audioCtxRef.resume();

      if (audio)    audio.play().then(()=>audio.pause()).catch(()=>{});
      if (bdayVideo) bdayVideo.play().then(()=>bdayVideo.pause()).catch(()=>{});

      if (gateOverlay) gateOverlay.classList.add('hidden');
      const s1 = document.getElementById('screen-1');
      if (s1) s1.classList.add('active');

      if (!prefersReducedMotion) setInterval(spawnPetal, CONFIG.petalInterval);

      if (CONFIG.useMicrophone && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        try {
          micStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
          initMicStream(micStream);
        } catch(err) {
          handleMicFallback();
        }
      } else {
        handleMicFallback();
      }
    });
  }

  function handleMicFallback() {
    if (micBarWrap) micBarWrap.classList.remove('visible');
    if (tapHint) tapHint.textContent = 'Tap the cake to blow out the candles! 🎂';
  }

  /* ── Mic → blow detection ── */
  function initMicStream(stream) {
    if (!audioCtxRef) return;
    const analyser = audioCtxRef.createAnalyser();
    analyser.fftSize = 256;
    audioCtxRef.createMediaStreamSource(stream).connect(analyser);
    if (micBarWrap) micBarWrap.classList.add('visible');
    const data = new Uint8Array(analyser.frequencyBinCount);

    function checkBlow() {
      if (isExtinguished) { if (micBarWrap) micBarWrap.classList.remove('visible'); return; }
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b,0)/data.length;
      if (micBarFill) micBarFill.style.transform = `scaleX(${Math.min(1, avg/CONFIG.micThreshold)})`;
      if (avg > CONFIG.micThreshold) extinguish();
      else micRafId = requestAnimationFrame(checkBlow);
    }
    checkBlow();
  }

  /* ── Extinguish — blow-lean + SVG smoke ── */
  function extinguish() {
    if (isExtinguished) return;
    isExtinguished = true;
    if (micRafId) cancelAnimationFrame(micRafId);
    if (micBarWrap) micBarWrap.classList.remove('visible');

    const flames = flameGroup ? flameGroup.querySelectorAll('.fl') : [];

    // Blow-lean first
    flames.forEach(f => f.classList.add('blow-react'));

    setTimeout(() => {
      flames.forEach((f, i) => {
        f.classList.remove('blow-react');
        f.style.animation = 'none';
        f.style.transition = `opacity 0.4s ease ${i*0.04}s, transform 0.4s ease ${i*0.04}s`;
        f.style.opacity = '0';
        f.style.transform = 'translateY(-20px) scale(0)';
        // SVG smoke at precise candle coords via getBBox
        try {
          const box = f.getBBox();
          const wx = box.x+box.width/2, wy = box.y+box.height;
          for (let j=0;j<2;j++) {
            const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
            c.setAttribute('cx',wx); c.setAttribute('cy',wy-4);
            c.setAttribute('r',(Math.random()*2+2).toFixed(1));
            c.className.baseVal = 'smoke-particle';
            c.style.setProperty('--dx',(Math.random()*16-8).toFixed(1)+'px');
            c.style.setProperty('--dy',(-30-Math.random()*30).toFixed(1)+'px');
            c.style.animationDelay = `${i*0.04+Math.random()*0.1}s`;
            if (smokeGroup) smokeGroup.appendChild(c);
            setTimeout(()=>c.remove(), 2500);
          }
        } catch(e){}
      });
    }, 200);

    if (tapHint) { tapHint.textContent='Make a Wish ✨'; tapHint.classList.add('wished'); }
    setTimeout(()=>navigateTo(2), CONFIG.extinguishDelay);
  }

  if (cakeArea) {
    cakeArea.addEventListener('click', ()=>{ if (!isExtinguished) extinguish(); });
    cakeArea.addEventListener('keydown', e=>{
      if (e.key==='Enter'||e.key===' ') { e.preventDefault(); if (!isExtinguished) extinguish(); }
    });
  }

  /* ── Waveform — real analyser, smooth sin fallback ── */
  function buildWaveform() {
    if (!waveformEl) return;
    waveformEl.innerHTML='';
    for (let i=0;i<28;i++) {
      const b=document.createElement('div'); b.className='wb'; waveformEl.appendChild(b);
    }
  }

  function setupAudioAnalyser() {
    if (audioAnalyser || !audioCtxRef) return;
    try {
      audioAnalyser = audioCtxRef.createAnalyser();
      audioAnalyser.fftSize = 64;
      audioAnalyser.smoothingTimeConstant = 0.75;
      const src = audioCtxRef.createMediaElementSource(audio);
      src.connect(audioAnalyser);
      audioAnalyser.connect(audioCtxRef.destination);
    } catch(e) { audioAnalyser = null; }
  }

  function animateWaveform() {
    if (!audio||audio.paused||!waveformEl) return;
    const bars = waveformEl.querySelectorAll('.wb');
    if (audioAnalyser) {
      const data = new Uint8Array(audioAnalyser.frequencyBinCount);
      audioAnalyser.getByteFrequencyData(data);
      bars.forEach((b,i)=>{ b.style.transform=`scaleY(${Math.max(0.08,data[i%data.length]/255)})`; });
    } else {
      bars.forEach((b,i)=>{
        const v=Math.max(0.08,(Math.sin((Date.now()/200)+i)*0.35+0.45+(Math.random()*0.1)));
        b.style.transform=`scaleY(${v})`;
      });
    }
    waveRafId = requestAnimationFrame(animateWaveform);
  }

  function stopWaveform() {
    if (waveRafId) cancelAnimationFrame(waveRafId);
    if (waveformEl) waveformEl.querySelectorAll('.wb').forEach(b=>b.style.transform='scaleY(0.08)');
  }

  function setPlayIcon(playing) {
    if (playIconPath) playIconPath.setAttribute('d', playing
      ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'
      : 'M8 5v14l11-7z');
  }

  function togglePlay() {
    if (!audio) return;
    if (audioCtxRef && audioCtxRef.state==='suspended') audioCtxRef.resume();
    setupAudioAnalyser();
    if (audio.paused) audio.play().then(()=>{ setPlayIcon(true); animateWaveform(); }).catch(()=>{});
    else { audio.pause(); setPlayIcon(false); stopWaveform(); }
  }

  if (playBtn) playBtn.addEventListener('click', togglePlay);
  if (skipBtn) skipBtn.addEventListener('click', ()=>navigateTo(3));
  if (audio) {
    audio.addEventListener('timeupdate', ()=>{
      if (audio.duration && progressFill)
        progressFill.style.transform = `scaleX(${audio.currentTime/audio.duration})`;
    });
    audio.addEventListener('ended', ()=>{ setPlayIcon(false); stopWaveform(); if(CONFIG.autoAdvanceAfterAudio) navigateTo(3); });
  }

  /* ── Fullscreen + orientation ── */
  async function toggleFullscreen() {
    if (!bdayVideo||!videoWrap) return;
    try {
      if (!document.fullscreenElement&&!document.webkitFullscreenElement) {
        if (bdayVideo.webkitEnterFullscreen) bdayVideo.webkitEnterFullscreen();
        else { const r=videoWrap.requestFullscreen||videoWrap.webkitRequestFullscreen; if(r) await r.call(videoWrap); }
      } else {
        const x=document.exitFullscreen||document.webkitExitFullscreen; if(x) await x.call(document);
      }
    } catch(e){}
  }

  function updateFsIcon() {
    const inFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
    if (fsPath) fsPath.setAttribute('d', inFs
      ? 'M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z'
      : 'M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z');
  }

  if (fsBtn) fsBtn.addEventListener('click', toggleFullscreen);
  document.addEventListener('fullscreenchange', updateFsIcon);
  document.addEventListener('webkitfullscreenchange', updateFsIcon);
  window.addEventListener('orientationchange', ()=>{ setTimeout(()=>{ if(videoWrap&&currentScreen===3) void videoWrap.offsetWidth; },150); });
  if (bdayVideo) bdayVideo.addEventListener('error', ()=>{ if(videoFallback) videoFallback.classList.add('show'); });

})();
</script>
</body>
</html>
