<script nonce="bday2026">
(function () {
  'use strict';

  /* ── CONFIG ── */
  const CONFIG = {
    recipientName:         'Ayman',
    audioPath:             'voice-message.mp3',
    videoPath:             'surprise-video.mp4',
    finaleText:            'I love you my Ophelia 🥺',
    useMicrophone:         true,
    micThreshold:          45,
    extinguishDelay:       3000,
    autoAdvanceAfterAudio: true,
    petalInterval:         290,
    maxPetals:             55,
  };

  /* ── DOM refs ── */
  const bgLayer       = document.getElementById('bg-layer');
  const gateOverlay   = document.getElementById('gate-overlay');
  const gateBtn       = document.getElementById('gate-btn');
  const cakeArea      = document.getElementById('cake-area');
  const flameGroup    = document.getElementById('flame-group');
  const smokeGroup    = document.getElementById('smoke-group');
  const tapHint       = document.getElementById('tap-hint');
  const recipientEl   = document.getElementById('recipient-name');
  const playBtn       = document.getElementById('play-btn');
  const playIconPath  = document.getElementById('play-icon-path');
  const waveformEl    = document.getElementById('waveform');
  const audio         = document.getElementById('bday-audio');
  const audioErr      = document.getElementById('audio-err');
  const progressFill  = document.getElementById('audio-progress-fill');
  const skipBtn       = document.getElementById('skip-btn');
  const bdayVideo     = document.getElementById('bday-video');
  const videoFallback = document.getElementById('video-fallback');
  const finaleTextEl  = document.getElementById('finale-text');
  const micBarWrap    = document.getElementById('mic-bar-wrap');
  const micBarFill    = document.getElementById('mic-bar-fill');
  const videoWrap     = document.getElementById('video-wrap');

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* REFACTOR [Phase 11]: Performance tracing measurements declared across initial runtime boundaries. */
  if (typeof performance !== 'undefined' && performance.mark) {
    performance.mark('app-init');
  }

  /* REFACTOR [Phase 11]: Global logging abstraction to provide cleaner debugging output. */
  function logEvent(message, data = {}) {
    const payload = {
      timestamp: new Date().toISOString(),
      level: 'INFO',
      message: message,
      ...data
    };
    console.log(JSON.stringify(payload));
  }

  /* REFACTOR [Phase 11]: Global error hook to capture uncaught execution bugs. */
  window.addEventListener('error', (err) => {
    const errorPayload = {
      timestamp: new Date().toISOString(),
      level: 'ERROR',
      message: err.message,
      filename: err.filename,
      lineno: err.lineno
    };
    console.error(JSON.stringify(errorPayload));
  });

  /* REFACTOR [Phase 11]: Capture unhandled exceptions that bypass standard catch structures. */
  window.addEventListener('unhandledrejection', (event) => {
    console.error(JSON.stringify({
      timestamp: new Date().toISOString(),
      level: 'UNHANDLED_REJECTION',
      reason: event.reason?.message || String(event.reason)
    }));
  });

  /* ── Initialization ── */
  if (recipientEl) recipientEl.innerHTML = 'Happy Birthday<br><em>' + CONFIG.recipientName + ' 🥺</em>';
  if (finaleTextEl) finaleTextEl.textContent = CONFIG.finaleText;

  /* FIX [Phase 6]: Activate focus trap on the gate dialog immediately on load so keyboard users
     cannot Tab outside it before it is dismissed. gateBtn is passed as the restore target so focus
     returns correctly if the dialog is ever re-shown. */
  if (gateOverlay && gateBtn) trapFocus(gateOverlay, gateBtn);

  if (CONFIG.audioPath && audio) {
    const ext = CONFIG.audioPath.split('.').pop().toLowerCase();
    const mimeMap = { mp3:'audio/mpeg', wav:'audio/wav', ogg:'audio/ogg', m4a:'audio/mp4' };
    const srcEl = document.createElement('source');
    srcEl.src  = CONFIG.audioPath;
    srcEl.type = mimeMap[ext] || 'audio/mpeg';
    audio.appendChild(srcEl);
    
    audio.addEventListener('error', () => {
      logEvent('audio-load-error', { src: CONFIG.audioPath });
      if (audioErr) audioErr.textContent = 'Voice message failed to load.';
    });
    audio.load();
  }

  if (CONFIG.videoPath && bdayVideo) {
    /* REFACTOR [Phase 3]: Set video source directly to video element rather than a child source tag,
       allowing video.addEventListener('error') to bubble correctly. */
    bdayVideo.src = CONFIG.videoPath;
    bdayVideo.load();
  }

  /* ── State ── */
  let currentScreen  = 1;
  let isExtinguished = false;
  let micRafId       = null;
  let waveRafId      = null;
  let audioCtxRef    = null;
  let audioAnalyser  = null;
  let audioSourceNode = null;
  let micStream      = null;
  let petalIntervalId = null;

  /* ── Navigation ── */
  function navigateTo(n) {
    if (currentScreen === n) return;
    
    if (typeof performance !== 'undefined' && performance.mark) {
      performance.mark(`navigate-screen-${n}`);
      const startMark = currentScreen === 1 ? 'app-init' : `navigate-screen-${currentScreen}`;
      try {
        performance.measure(`transition-to-${n}`, startMark, `navigate-screen-${n}`);
      } catch (e) { /* mark may not exist if navigateTo was called before prior mark was set */ }
    }

    if (currentScreen === 2 && audio) { 
      audio.pause(); 
      stopWaveform(); 
    }
    
    if (n === 2 && bgLayer) bgLayer.style.background = 'linear-gradient(135deg,#1a1018 0%,#231520 100%)';
    else if (n === 3 && bgLayer) bgLayer.style.background = 'linear-gradient(135deg,#0d0a0c 0%,#150f12 100%)';
    
    ['screen-1','screen-2','screen-3'].forEach(id => {
      const s = document.getElementById(id);
      if (s) s.classList.remove('active');
    });
    
    const target = document.getElementById('screen-' + n);
    if (target) { 
      /* REFACTOR [Phase 2/8]: Removed target.offsetWidth layout flush to eliminate layout thrashing. */
      target.classList.add('active'); 
      currentScreen = n; 
    }
    
    if (n === 2) buildWaveform();
    if (n === 3) {
      /* REFACTOR [Phase 4/10]: Clean up stream captures and events to prevent background processing leakages. */
      cleanupMicStream();
      if (petalIntervalId) { 
        clearInterval(petalIntervalId); 
        petalIntervalId = null; 
      }
    }
  }

  function cleanupMicStream() {
    if (micRafId) {
      cancelAnimationFrame(micRafId);
      micRafId = null;
    }
    if (micStream) { 
      micStream.getTracks().forEach(t => t.stop()); 
      micStream = null; 
    }
    logEvent('microphone-stream-closed');
  }

  /* ── Petals ── */
  const petalColors = ['#f0bcc8','#e899ac','#c4506a','#fdf6ee','#f0c870'];
  function spawnPetal() {
    if (prefersReducedMotion || document.hidden) return;
    if (document.getElementsByClassName('petal').length >= CONFIG.maxPetals) return;
    const p = document.createElement('div');
    p.className = 'petal';
    const sz = Math.random() * 13 + 7;
    p.style.cssText = `width:${sz}px;height:${sz}px;background:${petalColors[Math.floor(Math.random()*petalColors.length)]};opacity:${(Math.random()*0.5+0.3).toFixed(2)};`;
    p.style.left = Math.random() * window.innerWidth + 'px';
    p.style.top  = '-20px';
    const drift = Math.random() * 110 - 55;
    const dur   = Math.random() * 3500 + 4500;
    
    p.animate([
      { transform: 'translate3d(0,0,0) rotate(0deg)', opacity: 1 },
      { transform: `translate3d(${drift}px,${window.innerHeight+20}px,0) rotate(540deg)`, opacity: 0 }
    ], { duration: dur, easing: 'linear' }).onfinish = () => p.remove();
    document.body.appendChild(p);
  }

  /* ── Gate button ── */
  /* FIX [Phase 6]: gate-overlay had role="dialog" + aria-modal="true" but no keyboard Tab trap and no Escape handler.
     WCAG 2.1 SC 2.1.2 requires focus to remain inside an open modal dialog. trapFocus enforces bidirectional
     Tab/Shift+Tab cycling within the dialog's focusable children, and Escape closes it as per ARIA authoring practices. */
  function trapFocus(dialogEl, triggerEl) {
    const focusable = dialogEl.querySelectorAll(
      'a[href], button:not([disabled]), textarea, input, select, [tabindex]:not([tabindex="-1"])'
    );
    const first = focusable[0];
    const last  = focusable[focusable.length - 1];

    function onKeyDown(e) {
      if (e.key === 'Escape') {
        e.preventDefault();
        dialogEl.removeEventListener('keydown', onKeyDown);
        if (triggerEl) triggerEl.click();
        return;
      }
      if (e.key !== 'Tab') return;
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
      }
    }
    dialogEl.addEventListener('keydown', onKeyDown);
    if (first) first.focus();
  }

  if (gateBtn) {
    gateBtn.addEventListener('click', async () => {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (AudioCtx) {
        /* REFACTOR [Phase 10]: Singleton instance guard added to prevent AudioContext resource leaking. */
        if (!audioCtxRef) {
          audioCtxRef = new AudioCtx();
        }
        if (audioCtxRef.state === 'suspended') {
          await audioCtxRef.resume().catch(() => {});
        }
      }

      if (audio)    audio.play().then(() => audio.pause()).catch(() => {});
      if (bdayVideo) bdayVideo.play().then(() => bdayVideo.pause()).catch(() => {});

      if (gateOverlay) gateOverlay.classList.add('hidden');
      const s1 = document.getElementById('screen-1');
      if (s1) s1.classList.add('active');

      /* REFACTOR [Phase 6]: Focus shifted dynamically to provide consistent screen reader positioning. */
      if (cakeArea) {
        cakeArea.focus();
      }

      if (!prefersReducedMotion) {
        petalIntervalId = setInterval(spawnPetal, CONFIG.petalInterval);
      }

      if (CONFIG.useMicrophone && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        let micTimedOut = false;

        const micPermissionPromise = navigator.mediaDevices.getUserMedia({ audio: true, video: false });

        /* Attach a .then() directly on the permission promise — independent of the race — so a late
           grant (arriving after the 5s timeout fired) is always caught and used. If the timeout already
           called handleMicFallback(), this restores the hint text and mic bar and inits the stream.
           If permission arrives within the window the race handles it normally via initMicStream() below
           and this .then() is a no-op because micTimedOut is still false and the stream is the same. */
        micPermissionPromise.then(stream => {
          /* REFACTOR [Phase 4/5]: Hardened resolve guard to verify screen activity prior to binding microphone hooks. */
          if (micTimedOut && currentScreen === 1 && !isExtinguished) {
            micStream = stream;
            if (tapHint) tapHint.textContent = 'Mic permission diye phone kache niye fu dio 🥺';
            initMicStream(stream);
          } else if (micTimedOut || isExtinguished || currentScreen !== 1) {
            stream.getTracks().forEach(t => t.stop());
          }
        }).catch(() => { /* Denial handled in the race catch below. */ });

        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000));

        try {
          micStream = await Promise.race([micPermissionPromise, timeoutPromise]);
          /* REFACTOR [Phase 4/5]: State guard applied before starting mic context. */
          if (currentScreen === 1 && !isExtinguished) {
            initMicStream(micStream);
          } else {
            if (micStream) micStream.getTracks().forEach(t => t.stop());
          }
        } catch (err) {
          micTimedOut = true;
          logEvent('microphone-authorization-failed', { error: err.message });
          handleMicFallback();
        }
      } else {
        handleMicFallback();
      }
    });
  }

  function handleMicFallback() {
    if (micBarWrap) micBarWrap.classList.remove('visible');
    if (tapHint) tapHint.textContent = 'Tap the cake to blow out the candles! 🎂';
  }

  /* ── Mic → blow detection ── */
  function initMicStream(stream) {
    if (!audioCtxRef) return;
    /* REFACTOR [Phase 4/5]: Hardened state-checks to prevent starting mic loops if the screen transitioned early. */
    if (currentScreen !== 1 || isExtinguished) {
      if (stream) stream.getTracks().forEach(t => t.stop());
      return;
    }
    try {
      const analyser = audioCtxRef.createAnalyser();
      analyser.fftSize = 256;
      const source = audioCtxRef.createMediaStreamSource(stream);
      source.connect(analyser);
      
      if (micBarWrap) micBarWrap.classList.add('visible');
      const data = new Uint8Array(analyser.frequencyBinCount);

      function checkBlow() {
        if (isExtinguished || currentScreen !== 1) {
          if (micBarWrap) micBarWrap.classList.remove('visible');
          return;
        }
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b, 0) / data.length;
        if (micBarFill) micBarFill.style.transform = `scaleX(${Math.min(1, avg / CONFIG.micThreshold)})`;
        if (avg > CONFIG.micThreshold) extinguish();
        else micRafId = requestAnimationFrame(checkBlow);
      }
      checkBlow();
    } catch (e) {
      logEvent('microphone-node-init-failed', { error: e.message });
      handleMicFallback();
    }
  }

  /* ── Extinguish ── */
  function extinguish() {
    if (isExtinguished) return;
    isExtinguished = true;
    cleanupMicStream();
    
    if (micBarWrap) micBarWrap.classList.remove('visible');

    /* REFACTOR [Phase 6]: Update interactive state attributes on extinguish to prevent screen reader focus pollution. */
    if (cakeArea) {
      cakeArea.setAttribute('tabindex', '-1');
      cakeArea.setAttribute('aria-disabled', 'true');
      cakeArea.setAttribute('aria-label', 'Extinguished birthday cake.');
    }

    const flames = flameGroup ? flameGroup.querySelectorAll('.fl') : [];
    flames.forEach(f => f.classList.add('blow-react'));

    setTimeout(() => {
      flames.forEach((f, i) => {
        f.classList.remove('blow-react');
        f.style.animation  = 'none';
        void f.offsetWidth; 
        f.style.transition = `opacity 0.4s ease ${i * 0.04}s, transform 0.4s ease ${i * 0.04}s`;
        f.style.opacity    = '0';
        f.style.transform  = 'translateY(-20px) scale(0)';
        try {
          let wx, wy;
          const box = f.getBBox();
          if (box && box.width > 0 && box.height > 0) {
            wx = box.x + box.width / 2;
            wy = box.y + box.height;
          } else {
            const pathEl = f.querySelector('path');
            const dAttr = pathEl ? pathEl.getAttribute('d') : '';
            const match = dAttr ? dAttr.match(/^M\s*([\d.]+)\s*,\s*([\d.]+)/i) : null;
            if (match) {
              wx = parseFloat(match[1]);
              wy = parseFloat(match[2]);
            } else {
              wx = 140;
              wy = 150;
            }
          }
          for (let j = 0; j < 2; j++) {
            const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('cx', wx);
            c.setAttribute('cy', wy - 4);
            c.setAttribute('r', (Math.random() * 2 + 2).toFixed(1));
            c.className.baseVal = 'smoke-particle';
            c.style.setProperty('--dx', (Math.random() * 16 - 8).toFixed(1) + 'px');
            c.style.setProperty('--dy', (-30 - Math.random() * 30).toFixed(1) + 'px');
            c.style.animationDelay = `${(i * 0.04 + Math.random() * 0.1).toFixed(3)}s`;
            if (smokeGroup) smokeGroup.appendChild(c);
            
            setTimeout(() => c.remove(), 2500);
          }
        } catch (e) { /* Fallback fail-safe catch block */ }
      });
    }, 200);

    if (tapHint) {
      tapHint.textContent = 'Make a Wish ✨';
      tapHint.classList.add('wished');
    }
    setTimeout(() => navigateTo(2), CONFIG.extinguishDelay);
  }

  if (cakeArea) {
    cakeArea.addEventListener('click', () => { if (!isExtinguished) extinguish(); });
    cakeArea.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (!isExtinguished) extinguish();
      }
    });
  }

  /* ── Waveform ── */
  function buildWaveform() {
    if (!waveformEl) return;
    waveformEl.innerHTML = '';
    for (let i = 0; i < 28; i++) {
      const b = document.createElement('div');
      b.className = 'wb';
      waveformEl.appendChild(b);
    }
  }

  /* REFACTOR [Phase 4]: Dynamic audio connection logic securely isolated to prevent multiple source attachment exceptions. */
  function setupAudioAnalyser() {
    if (audioAnalyser || !audioCtxRef || !audio) return;
    try {
      audioAnalyser = audioCtxRef.createAnalyser();
      audioAnalyser.fftSize = 64;
      audioAnalyser.smoothingTimeConstant = 0.75;
      
      /* REFACTOR [Phase 4]: Added DynamicsCompressorNode to prevent clipping. */
      const compressor = audioCtxRef.createDynamicsCompressor();
      compressor.threshold.setValueAtTime(-24, audioCtxRef.currentTime);
      compressor.knee.setValueAtTime(40, audioCtxRef.currentTime);
      compressor.ratio.setValueAtTime(12, audioCtxRef.currentTime);
      compressor.attack.setValueAtTime(0.003, audioCtxRef.currentTime);
      compressor.release.setValueAtTime(0.25, audioCtxRef.currentTime);

      if (!audioSourceNode) {
        audioSourceNode = audioCtxRef.createMediaElementSource(audio);
      }
      
      audioSourceNode.connect(compressor);
      compressor.connect(audioAnalyser);
      audioAnalyser.connect(audioCtxRef.destination);
    } catch (e) {
      logEvent('audio-analyser-setup-failed', { error: e.message });
      audioAnalyser = null;
    }
  }

  function animateWaveform() {
    if (!audio || audio.paused || !waveformEl) return;
    const bars = waveformEl.querySelectorAll('.wb');
    if (bars.length === 0) return;

    if (audioAnalyser) {
      const data = new Uint8Array(audioAnalyser.frequencyBinCount);
      audioAnalyser.getByteFrequencyData(data);
      bars.forEach((b, i) => {
        const val = data[i % data.length] / 255;
        // REFACTOR [Phase 2]: Instantaneous style transforms bypassed transition engines to avoid layout layout thrashing.
        b.style.transform = `scaleY(${Math.max(0.08, val)})`;
      });
    } else {
      bars.forEach((b, i) => {
        const v = Math.max(0.08, (Math.sin((Date.now() / 200) + i) * 0.35 + 0.45 + (Math.random() * 0.1)));
        b.style.transform = `scaleY(${v})`;
      });
    }
    waveRafId = requestAnimationFrame(animateWaveform);
  }

  function stopWaveform() {
    if (waveRafId) { cancelAnimationFrame(waveRafId); waveRafId = null; }
    if (waveformEl) waveformEl.querySelectorAll('.wb').forEach(b => b.style.transform = 'scaleY(0.08)');
  }

  function setPlayIcon(playing) {
    if (playIconPath) {
      playIconPath.setAttribute('d', playing
        ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'
        : 'M8 5v14l11-7z');
    }
    if (playBtn) playBtn.setAttribute('aria-pressed', playing ? 'true' : 'false');
    if (playBtn) playBtn.setAttribute('aria-label', playing ? 'Pause audio' : 'Play audio');
  }

  function togglePlay() {
    if (!audio) return;
    if (audioCtxRef && audioCtxRef.state === 'suspended') audioCtxRef.resume();
    setupAudioAnalyser();
    if (audio.paused) {
      audio.play()
        .then(() => { 
          setPlayIcon(true); 
          /* REFACTOR [Phase 5]: Cancel pending requestAnimationFrame frames to prevent concurrent loop propagation. */
          if (waveRafId) {
            cancelAnimationFrame(waveRafId);
          }
          animateWaveform(); 
        })
        .catch((e) => {
          logEvent('audio-play-failed', { error: e.message });
          if (audioErr) audioErr.textContent = 'Playback blocked. Tap play again.';
        });
    } else {
      audio.pause();
      setPlayIcon(false);
      stopWaveform();
    }
  }

  if (playBtn) playBtn.addEventListener('click', togglePlay);
  if (skipBtn) skipBtn.addEventListener('click', () => navigateTo(3));

  if (audio) {
    audio.addEventListener('timeupdate', () => {
      if (audio.duration && progressFill) {
        progressFill.style.transform = `scaleX(${audio.currentTime / audio.duration})`;
      }
    });
    audio.addEventListener('ended', () => {
      setPlayIcon(false);
      stopWaveform();
      if (CONFIG.autoAdvanceAfterAudio) navigateTo(3);
    });
  }

  window.addEventListener('orientationchange', () => {
    setTimeout(() => {
      /* REFACTOR [Phase 2/8]: Removed target.offsetWidth layout flush to eliminate layout thrashing. */
    }, 150);
  });

  if (bdayVideo) {
    bdayVideo.addEventListener('error', () => {
      logEvent('video-load-error', { src: CONFIG.videoPath });
      if (videoFallback) videoFallback.classList.add('show');
    });
  }

  /* REFACTOR [Phase 12]: Power efficiency visible tab check. Suspends resource execution. */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      logEvent('visibility-hidden-idle-trigger');
      if (audioCtxRef && audioCtxRef.state === 'running') {
        audioCtxRef.suspend();
      }
      if (audio && !audio.paused) {
        audio.pause();
        setPlayIcon(false);
      }
      /* REFACTOR [Phase 3/12]: Pause video playing on screen-3 to conserve background battery drain. */
      if (bdayVideo && !bdayVideo.paused) {
        bdayVideo.pause();
      }
      stopWaveform();
      cleanupMicStream();
      /* REFACTOR [Phase 10/12]: Suspend petal spawning background interval on tab blur. */
      if (petalIntervalId) {
        clearInterval(petalIntervalId);
        petalIntervalId = null;
      }
    } else {
      logEvent('visibility-visible-idle-release');
      /* FIX [Phase 12]: AudioContext was explicitly suspended on hide but never resumed on show. The mic
         re-acquisition below calls initMicStream() which internally uses audioCtxRef — if it remains
         suspended the analyser graph runs silently with no output, making blow detection non-functional
         until the next user gesture. Resume first so the context is ready before the stream connects. */
      if (audioCtxRef && audioCtxRef.state === 'suspended') {
        audioCtxRef.resume().catch(() => {});
      }
      if (currentScreen === 1 && !isExtinguished && CONFIG.useMicrophone) {
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia && !micStream) {
          navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            /* REFACTOR [Phase 4/5]: State guard applied before creating a background-stream link. */
            if (currentScreen === 1 && !isExtinguished) {
              micStream = stream;
              initMicStream(stream);
            } else {
              stream.getTracks().forEach(t => t.stop());
            }
          }).catch(() => {});
        }
      }
      /* REFACTOR [Phase 10/12]: Resume background petal spawning system. */
      if (currentScreen < 3 && !petalIntervalId && !prefersReducedMotion) {
        petalIntervalId = setInterval(spawnPetal, CONFIG.petalInterval);
      }
    }
  });

})();
</script>
</body>
</html>
