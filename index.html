<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fdf6ee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Happy Birthday Ayman🥺</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream:        #fdf8f2;
      --rose:         #c4506a;
      --rose-light:   #e8829a;
      --blush:        #f0c0cc;
      --mauve:        #7a4a66;
      --mauve-light:  #b07898;
      --gold:         #d4a045;
      --gold-light:   #f0c870;
      --dark:         #18100e;
      --glass:        rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.13);
      --t-smooth:     0.65s cubic-bezier(0.4,0,0.2,1);
      --t-fast:       0.25s cubic-bezier(0.4,0,0.2,1);
      --r-lg:         28px;
    }

    body {
      width: 100%; height: 100vh; height: 100dvh;
      overflow: hidden;
      font-family: 'Jost', sans-serif;
      color: var(--dark);
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      position: relative;
    }

    #bg-layer {
      position: fixed; inset: 0; z-index: -2;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 30%, #fff9f3 0%, #fdf6ee 55%, #f7e8da 100%);
      transition: background 1.3s ease;
    }

    .petal {
      position: fixed; pointer-events: none;
      z-index: 0; will-change: transform, opacity;
      border-radius: 50% 0 50% 50%;
    }

    /* ── LANDING GATEWAY OVERLAY ── */
    #gate-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: radial-gradient(ellipse at 50% 30%, #fff9f3 0%, #fdf6ee 55%, #f7e8da 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    #gate-overlay.hidden { opacity: 0; visibility: hidden; transition: opacity var(--t-smooth), visibility var(--t-smooth); }
    
    .gate-card {
      max-width: 320px;
      display: flex; flex-direction: column; align-items: center;
    }
    .gate-btn {
      margin-top: 30px; padding: 16px 42px;
      font-family: 'Jost', sans-serif; font-size: 0.95rem; font-weight: 400;
      letter-spacing: 2px; color: #fff; text-transform: uppercase;
      background: linear-gradient(135deg, var(--rose) 0%, var(--mauve) 100%);
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 10px 28px rgba(196,80,106,0.35);
      transition: transform var(--t-fast), box-shadow var(--t-fast);
    }
    .gate-btn:active { transform: scale(0.96); box-shadow: 0 4px 12px rgba(196,80,106,0.2); }

    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transform: translateY(28px) scale(0.98);
      transition: opacity var(--t-smooth), visibility var(--t-smooth), transform var(--t-smooth);
      padding: 20px; z-index: 10;
    }
    .screen.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

    /* ── SCREEN 1 ── */
    #screen-1 { background: transparent; }
    .s1-eyebrow {
      font-size: clamp(0.6rem, 2.8vw, 0.85rem);
      font-weight: 300; letter-spacing: 7px;
      text-transform: uppercase; color: var(--mauve-light);
      margin-bottom: 6px; text-align: center;
    }
    .s1-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 4.6rem);
      font-weight: 700; line-height: 1.1;
      text-align: center; margin-bottom: 18px; color: var(--dark);
    }
    .s1-name em { color: var(--rose); font-style: italic; }

    .cake-area {
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; position: relative;
    }
    .cake-float { animation: float 4s ease-in-out infinite; will-change: transform; }
    .cake-area:active .cake-float { transform: scale(0.94); }

    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-9px) rotate(0.4deg); }
    }

    .fl { will-change: transform, opacity; transform-box: fill-box; transform-origin: 50% 100%; }
    .fl-1  { animation: flk1 0.14s ease-in-out infinite alternate; }
    .fl-2  { animation: flk2 0.17s ease-in-out infinite alternate; animation-delay: 0.03s; }
    .fl-3  { animation: flk1 0.13s ease-in-out infinite alternate; animation-delay: 0.07s; }
    .fl-4  { animation: flk2 0.18s ease-in-out infinite alternate; animation-delay: 0.01s; }
    .fl-5  { animation: flk1 0.15s ease-in-out infinite alternate; animation-delay: 0.06s; }
    .fl-6  { animation: flk2 0.12s ease-in-out infinite alternate; animation-delay: 0.09s; }
    .fl-7  { animation: flk1 0.16s ease-in-out infinite alternate; animation-delay: 0.04s; }
    .fl-8  { animation: flk2 0.14s ease-in-out infinite alternate; animation-delay: 0.08s; }
    .fl-9  { animation: flk1 0.19s ease-in-out infinite alternate; animation-delay: 0.02s; }
    .fl-10 { animation: flk2 0.13s ease-in-out infinite alternate; animation-delay: 0.05s; }
    .fl-11 { animation: flk1 0.15s ease-in-out infinite alternate; animation-delay: 0.00s; }
    .fl-12 { animation: flk2 0.16s ease-in-out infinite alternate; animation-delay: 0.07s; }
    .fl-13 { animation: flk1 0.14s ease-in-out infinite alternate; animation-delay: 0.03s; }
    .fl-14 { animation: flk2 0.17s ease-in-out infinite alternate; animation-delay: 0.09s; }
    .fl-15 { animation: flk1 0.12s ease-in-out infinite alternate; animation-delay: 0.06s; }
    .fl-16 { animation: flk2 0.18s ease-in-out infinite alternate; animation-delay: 0.02s; }
    .fl-17 { animation: flk1 0.15s ease-in-out infinite alternate; animation-delay: 0.05s; }
    .fl-18 { animation: flk2 0.13s ease-in-out infinite alternate; animation-delay: 0.08s; }
    .fl-19 { animation: flk1 0.16s ease-in-out infinite alternate; animation-delay: 0.01s; }

    @keyframes flk1 {
      0%   { transform: scale(0.92) rotate(-1.5deg); opacity: 0.82; }
      100% { transform: scale(1.06) rotate(1.8deg);  opacity: 1;    }
    }
    @keyframes flk2 {
      0%   { transform: scale(1.04) rotate(1deg);   opacity: 0.88; }
      100% { transform: scale(0.94) rotate(-2deg);  opacity: 0.78; }
    }

    .smoke-particle {
      fill: #a1a1aa; opacity: 0; transform-origin: center; transform-box: fill-box;
      animation: smoke-rise 2s ease-out forwards;
    }
    @keyframes smoke-rise {
      0%   { transform: translate(0, 0) scale(0.3); opacity: 0.6; }
      40%  { opacity: 0.3; }
      100% { transform: translate(var(--dx), var(--dy)) scale(2.2); opacity: 0; }
    }

    #mic-bar-wrap {
      position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%);
      width: 140px; height: 6px; background: rgba(196,80,106,0.15);
      border-radius: 4px; overflow: hidden; opacity: 0; transition: opacity 0.4s;
    }
    #mic-bar-wrap.visible { opacity: 1; }
    #mic-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, var(--rose-light), var(--gold));
      border-radius: 4px; transition: width 0.08s linear;
    }

    .tap-hint {
      margin-top: 18px; font-size: clamp(0.72rem, 2.8vw, 0.85rem);
      font-weight: 300; letter-spacing: 1.5px; color: var(--mauve);
      background: rgba(200,80,106,0.09); padding: 10px 24px; border-radius: 24px;
      text-align: center; animation: hint-pulse 2.2s ease-in-out infinite;
      max-width: 88vw; transition: all var(--t-fast);
    }
    .tap-hint.wished { background: rgba(212,160,69,0.14); color: var(--gold); animation: none; }
    @keyframes hint-pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

    /* ── SCREEN 2 ── */
    #screen-2 { color: var(--cream); }
    .glass-card {
      background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); padding: clamp(24px, 6vw, 44px);
      border-radius: var(--r-lg); text-align: center; width: min(400px, 92vw);
      box-shadow: 0 24px 60px rgba(0,0,0,0.36); position: relative;
    }
    .card-eyebrow { font-size: clamp(0.65rem, 2.8vw, 0.8rem); font-weight: 300; letter-spacing: 2px; opacity: 0.85; margin-bottom: 8px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: clamp(1.2rem, 4.5vw, 1.7rem); font-weight: 400; font-style: italic; margin-bottom: 22px; opacity: 0.92; }
    
    .waveform { display: flex; align-items: flex-end; justify-content: center; gap: 4px; height: 58px; margin: 4px 0 22px; }
    .wb { width: 4px; min-height: 8%; border-radius: 6px; transition: height 0.1s ease-out; will-change: height; opacity: 0.88; }
    .wb:nth-child(3n)   { background: var(--rose); }
    .wb:nth-child(3n+1) { background: var(--blush); }
    .wb:nth-child(3n+2) { background: var(--gold-light); }

    .play-btn {
      width: 68px; height: 68px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
      background: linear-gradient(135deg, var(--rose) 0%, var(--mauve) 100%); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; margin: 0 auto; transition: all var(--t-fast);
      box-shadow: 0 8px 24px rgba(196,80,106,0.4);
    }
    .play-btn:hover { transform: scale(1.07); }
    .play-btn svg { width: 22px; height: 22px; pointer-events: none; }
    .audio-progress { width: 100%; height: 3px; background: rgba(255,255,255,0.12); border-radius: 4px; margin-top: 18px; overflow: hidden; }
    .audio-progress-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); width: 0%; transition: width 0.5s linear; }
    .skip-btn { margin-top: 22px; font-size: 0.78rem; font-weight: 300; letter-spacing: 1.5px; color: var(--cream); opacity: 0.45; background: none; border: none; cursor: pointer; padding: 8px 12px; }

    /* ── SCREEN 3 ── */
    #screen-3 { color: var(--cream); gap: 20px; justify-content: center; }
    .video-wrap { width: min(740px, 94vw); aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.55); position: relative; }
    .video-wrap video { width: 100%; height: 100%; object-fit: contain; display: block; }
    #fs-btn { position: absolute; bottom: 10px; right: 10px; width: 38px; height: 38px; border-radius: 8px; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 20; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
    #fs-btn svg { width: 18px; height: 18px; pointer-events: none; }
    .video-fallback { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #1e1418; color: var(--blush); text-align: center; }
    .video-fallback.show { display: flex; }
    .finale-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1rem, 3.5vw, 1.3rem); opacity: 0.82; text-align: center; padding: 0 20px; }
  </style>
</head>
<body>

<div id="bg-layer" aria-hidden="true"></div>

<!-- ── CUSTOMIZED ACTIVATE OVERLAY ── -->
<div id="gate-overlay">
  <div class="gate-card">
    <p class="s1-eyebrow">For my special lady</p>
    <h2 style="font-family: 'Playfair Display', serif; font-weight:400; font-style:italic; margin-top:10px; color:#18100e;">Hope this year goes better than the last</h2>
    <button class="gate-btn" id="gate-btn">To Ayman ✨</button>
  </div>
</div>

<section class="screen" id="screen-1">
  <p class="s1-eyebrow">wishing you a magical</p>
  <h1 class="s1-name" id="recipient-name">Happy Birthday<br><em>Ayman</em></h1>

  <div class="cake-area" id="cake-area" role="button" tabindex="0" aria-label="Tap to extinguish candles">
    <div class="cake-float">
      <svg class="cake-svg" width="280" height="320" viewBox="0 0 280 320" aria-hidden="true">
        <rect x="14" y="220" width="252" height="72" rx="14" fill="#f0bcc8"/>

        <rect x="38" y="158" width="204" height="62" rx="12" fill="#e89aac"/>

        <path d="M38,170 Q52,178 66,170 Q80,178 94,170 Q108,178 122,170 Q136,178 150,170 Q164,178 178,170 Q192,178 206,170 Q220,178 234,170 Q242,178 242,170" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3.5"/>
        <rect x="74" y="100" width="132" height="58" rx="12" fill="#f0bcc8"/>

        <path d="M74,112 Q88,120 102,112 Q116,120 130,112 Q144,120 158,112 Q172,120 186,112 Q200,120 206,112" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="3"/>

        <g id="candles-group">
          <rect x="27" y="186" width="6" height="34" rx="2" fill="#7a4a66"/><rect x="55" y="183" width="6" height="37" rx="2" fill="#d4a045"/>
          <rect x="83" y="186" width="6" height="34" rx="2" fill="#7a4a66"/><rect x="111" y="183" width="6" height="37" rx="2" fill="#d4a045"/>
          <rect x="137" y="185" width="6" height="35" rx="2" fill="#c4506a"/><rect x="163" y="183" width="6" height="37" rx="2" fill="#d4a045"/>
          <rect x="191" y="186" width="6" height="34" rx="2" fill="#7a4a66"/><rect x="219" y="183" width="6" height="37" rx="2" fill="#d4a045"/>
          <rect x="247" y="186" width="6" height="34" rx="2" fill="#7a4a66"/>
          <rect x="53" y="126" width="6" height="32" rx="2" fill="#d4a045"/><rect x="85" y="123" width="6" height="35" rx="2" fill="#7a4a66"/>
          <rect x="117" y="126" width="6" height="32" rx="2" fill="#c4506a"/><rect x="157" y="126" width="6" height="32" rx="2" fill="#c4506a"/>
          <rect x="189" y="123" width="6" height="35" rx="2" fill="#7a4a66"/><rect x="221" y="126" width="6" height="32" rx="2" fill="#d4a045"/>
          <rect x="93" y="70" width="6" height="30" rx="2" fill="#7a4a66"/><rect x="117" y="67" width="6" height="33" rx="2" fill="#d4a045"/>
          <rect x="153" y="67" width="6" height="33" rx="2" fill="#c4506a"/><rect x="177" y="70" width="6" height="30" rx="2" fill="#7a4a66"/>
        </g>

        <g id="flame-group">
          <g class="fl fl-1"><path d="M30,186 Q26,171 30,163 Q34,171 30,186Z" fill="#ffcc44"/></g>

          <g class="fl fl-5"><path d="M140,185 Q136,170 140,162 Q144,170 140,185Z" fill="#ffcc44"/></g>
          <g class="fl fl-6"><path d="M166,183 Q162,167 166,159 Q170,167 166,183Z" fill="#ff9933"/></g>
          <g class="fl fl-7"><path d="M194,186 Q190,171 194,163 Q198,171 194,186Z" fill="#ffcc44"/></g>

          <g class="fl fl-13"><path d="M160,126 Q156,112 160,104 Q164,112 160,126Z" fill="#ffcc44"/></g>

      </svg>
    </div>
    <div id="mic-bar-wrap"><div id="mic-bar-fill"></div></div>
  </div>

  <p class="tap-hint" id="tap-hint">Please grant permission when asked, then blow gently on your mic!</p>
</section>

<section class="screen" id="screen-2">
  <div class="glass-card">
    <p class="card-eyebrow">I always wanted to sing a song for you🥺</p>
    <h2 class="card-title">Close your eyes…</h2>
    <div class="waveform" id="waveform"></div>
    <button class="play-btn" id="play-btn" aria-label="Play audio">
      <svg viewBox="0 0 24 24" fill="currentColor"><path id="play-icon-path" d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="audio-progress"><div class="audio-progress-fill" id="audio-progress-fill"></div></div>
    <audio id="bday-audio" preload="metadata" playsinline></audio>
    <p id="audio-err" style="color:var(--rose-light); font-size:12px; margin-top:8px;"></p>
    <button class="skip-btn" id="skip-btn">Skip to surprise →</button>
  </div>
</section>

<section class="screen" id="screen-3">
  <div class="video-wrap" id="video-wrap">
    <video id="bday-video" playsinline webkit-playsinline controls preload="metadata">
      <source id="video-src" src="" type="video/mp4">
    </video>
    <div class="video-fallback" id="video-fallback">🎬 Surprise video not found.</div>
    <button id="fs-btn" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path id="fs-path" d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
  </div>
  <p class="finale-text" id="finale-text"></p>
</section>

<script>
(function () {
  'use strict';

  const CONFIG = {
    recipientName:           'Ayman',
    audioPath:               'voice-message.mp3',
    videoPath:               'surprise-video.mp4',
    finaleText:              'I love you my Ophelia🥺',
    useMicrophone:           true,
    micThreshold:            42, 
    extinguishDelay:         3000,
    autoAdvanceAfterAudio:   true,
    petalInterval:           290,
    maxPetals:               55,
  };

  const bgLayer      = document.getElementById('bg-layer');
  const gateOverlay  = document.getElementById('gate-overlay');
  const gateBtn      = document.getElementById('gate-btn');
  const screen1      = document.getElementById('screen-1');
  const screen2      = document.getElementById('screen-2');
  const screen3      = document.getElementById('screen-3');
  const cakeArea     = document.getElementById('cake-area');
  const flameGroup   = document.getElementById('flame-group');
  const smokeGroup   = document.getElementById('smoke-group');
  const tapHint      = document.getElementById('tap-hint');
  const recipientEl  = document.getElementById('recipient-name');
  const playBtn      = document.getElementById('play-btn');
  const playIconPath = document.getElementById('play-icon-path');
  const waveformEl   = document.getElementById('waveform');
  const audio        = document.getElementById('bday-audio');
  const audioErr     = document.getElementById('audio-err');
  const progressFill = document.getElementById('audio-progress-fill');
  const skipBtn      = document.getElementById('skip-btn');
  const bdayVideo    = document.getElementById('bday-video');
  const videoSrc     = document.getElementById('video-src');
  const videoFallback= document.getElementById('video-fallback');
  const finaleTextEl = document.getElementById('finale-text');
  const micBarWrap   = document.getElementById('mic-bar-wrap');
  const micBarFill   = document.getElementById('mic-bar-fill');
  const videoWrap    = document.getElementById('video-wrap');
  const fsBtn        = document.getElementById('fs-btn');
  const fsPath       = document.getElementById('fs-path');

  recipientEl.innerHTML = 'Happy Birthday<br><em>' + CONFIG.recipientName + '</em>';
  finaleTextEl.textContent = CONFIG.finaleText;

  if (CONFIG.audioPath) {
    const ext = CONFIG.audioPath.split('.').pop().toLowerCase();
    const mimeMap = { mp3:'audio/mpeg', wav:'audio/wav', ogg:'audio/ogg', m4a:'audio/mp4' };
    const srcEl = document.createElement('source');
    srcEl.src = CONFIG.audioPath;
    srcEl.type = mimeMap[ext] || 'audio/mpeg';
    audio.appendChild(srcEl);
    audio.load();
  }
  if (CONFIG.videoPath) { videoSrc.src = CONFIG.videoPath; bdayVideo.load(); }

  let currentScreen  = 1;
  let isExtinguished = false;
  let micRafId       = null;
  let waveRafId      = null;
  let audioCtxRef    = null; 
  let audioAnalyser  = null;

  function navigateTo(n) {
    if (currentScreen === n) return;
    if (currentScreen === 2) { audio.pause(); stopWaveform(); }
    if (n === 2) bgLayer.style.background = 'linear-gradient(135deg,#1a1018 0%,#231520 100%)';
    else if (n === 3) bgLayer.style.background = 'linear-gradient(135deg,#0d0a0c 0%,#150f12 100%)';
    
    [screen1, screen2, screen3].forEach(s => s.classList.remove('active'));
    const target = document.getElementById('screen-' + n);
    if (target) { void target.offsetWidth; target.classList.add('active'); currentScreen = n; }
    if (n === 2) { buildWaveform(); }
  }

  const petalColors = ['#f0bcc8','#e899ac','#c4506a','#fdf6ee','#f0c870'];
  function spawnPetal() {
    if (document.getElementsByClassName('petal').length >= CONFIG.maxPetals) return;
    const p = document.createElement('div');
    p.className = 'petal';
    const sz = Math.random() * 13 + 7;
    p.style.cssText = `width:${sz}px;height:${sz}px;background:${petalColors[Math.floor(Math.random()*petalColors.length)]};opacity:${(Math.random()*0.5+0.3).toFixed(2)};`;
    p.style.left = Math.random() * window.innerWidth + 'px'; p.style.top = '-20px';
    const drift = Math.random() * 110 - 55, dur = Math.random() * 3500 + 4500;
    p.animate([
      { transform:'translate3d(0,0,0) rotate(0deg)', opacity:1 },
      { transform:`translate3d(${drift}px,${window.innerHeight+20}px,0) rotate(540deg)`, opacity:0 }
    ], { duration:dur, easing:'linear' }).onfinish = () => p.remove();
    document.body.appendChild(p);
  }

  gateBtn.addEventListener('click', async () => {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    audioCtxRef = new AudioCtx();
    if (audioCtxRef.state === 'suspended') {
      audioCtxRef.resume();
    }

    audio.play().then(() => audio.pause()).catch(() => {});
    bdayVideo.play().then(() => bdayVideo.pause()).catch(() => {});

    gateOverlay.classList.add('hidden');
    screen1.classList.add('active');
    setInterval(spawnPetal, CONFIG.petalInterval);

    if (CONFIG.useMicrophone && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        initMicStream(stream);
      } catch (err) {
        console.warn('Microphone access fallback enabled:', err);
        handleMicFallback();
      }
    } else {
      handleMicFallback();
    }
  });

  function handleMicFallback() {
    micBarWrap.classList.remove('visible');
    tapHint.innerHTML = 'Tap the cake to blow out the candles! 🎂';
    tapHint.style.background = 'rgba(196,80,106,0.12)';
  }

  function initMicStream(stream) {
    if (!audioCtxRef) return;
    
    const analyser = audioCtxRef.createAnalyser();
    analyser.fftSize = 256;
    audioCtxRef.createMediaStreamSource(stream).connect(analyser);

    micBarWrap.classList.add('visible');
    const data = new Uint8Array(analyser.frequencyBinCount);

    function checkBlow() {
      if (isExtinguished) { micBarWrap.classList.remove('visible'); return; }
      
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;

      const pct = Math.min(100, (avg / CONFIG.micThreshold) * 100);
      micBarFill.style.width = pct + '%';

      if (avg > CONFIG.micThreshold) {
        extinguish();
      } else {
        micRafId = requestAnimationFrame(checkBlow);
      }
    }
    checkBlow();
  }

  function extinguish() {
    if (isExtinguished) return;
    isExtinguished = true;
    if (micRafId) cancelAnimationFrame(micRafId);
    micBarWrap.classList.remove('visible');

    const flames = flameGroup.querySelectorAll('.fl');
    flames.forEach((f, i) => {
      f.style.animation = 'none';
      f.style.transition = `opacity 0.4s ease ${i*0.04}s, transform 0.4s ease ${i*0.04}s`;
      f.style.opacity = '0';
      f.style.transform = 'translateY(-20px) scale(0)';

      try {
        const box = f.getBBox();
        const wx = box.x + box.width / 2;
        const wy = box.y + box.height;
        for (let j = 0; j < 2; j++) {
          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', wx); circle.setAttribute('cy', wy - 4);
          circle.setAttribute('r', (Math.random() * 2 + 2).toFixed(1));
          circle.className.baseVal = 'smoke-particle';
          circle.style.setProperty('--dx', (Math.random() * 16 - 8).toFixed(1) + 'px');
          circle.style.setProperty('--dy', (-30 - Math.random() * 30).toFixed(1) + 'px');
          circle.style.animationDelay = `${i * 0.04 + Math.random() * 0.1}s`;
          smokeGroup.appendChild(circle);
          setTimeout(() => circle.remove(), 2500);
        }
      } catch(e) {}
    });

    tapHint.textContent = 'Make a Wish ✨';
    tapHint.classList.add('wished');
    setTimeout(() => navigateTo(2), CONFIG.extinguishDelay);
  }

  cakeArea.addEventListener('click', () => {
    if (!isExtinguished) extinguish();
  });

  function buildWaveform() {
    waveformEl.innerHTML = '';
    for (let i = 0; i < 28; i++) {
      const b = document.createElement('div');
      b.className = 'wb'; b.style.height = '10%';
      waveformEl.appendChild(b);
    }
  }

  function togglePlay() {
    if (!audioAnalyser && audioCtxRef) {
      try {
        audioAnalyser = audioCtxRef.createAnalyser();
        audioAnalyser.fftSize = 64;
        const src = audioCtxRef.createMediaElementSource(audio);
        src.connect(audioAnalyser);
        audioAnalyser.connect(audioCtxRef.destination);
      } catch(e) { audioAnalyser = null; }
    }

    if (audio.paused) {
      audio.play().then(() => { setPlayIcon(true); animateWaveform(); }).catch(() => {});
    } else {
      audio.pause(); setPlayIcon(false); stopWaveform();
    }
  }

  function animateWaveform() {
    if (audio.paused) return;
    const bars = waveformEl.querySelectorAll('.wb');
    if (audioAnalyser) {
      const data = new Uint8Array(audioAnalyser.frequencyBinCount);
      audioAnalyser.getByteFrequencyData(data);
      bars.forEach((b, i) => {
        b.style.height = Math.max(8, (data[i % data.length] / 255) * 100) + '%';
      });
    } else {
      bars.forEach((b, i) => {
        b.style.height = (Math.sin((Date.now() / 200) + i) * 35 + 45 + (Math.random() * 10)) + '%';
      });
    }
    waveRafId = requestAnimationFrame(animateWaveform);
  }

  function stopWaveform() {
    if (waveRafId) cancelAnimationFrame(waveRafId);
    waveformEl.querySelectorAll('.wb').forEach(b => b.style.height = '10%');
  }

  function setPlayIcon(playing) {
    playIconPath.setAttribute('d', playing ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z' : 'M8 5v14l11-7z');
  }

  playBtn.addEventListener('click', togglePlay);
  skipBtn.addEventListener('click', () => navigateTo(3));
  audio.addEventListener('timeupdate', () => { if (audio.duration) progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%'; });
  audio.addEventListener('ended', () => { setPlayIcon(false); stopWaveform(); if (CONFIG.autoAdvanceAfterAudio) navigateTo(3); });

  async function toggleFullscreen() {
    try {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (bdayVideo.webkitEnterFullscreen) { bdayVideo.webkitEnterFullscreen(); }
        else {
          const requestFS = videoWrap.requestFullscreen || videoWrap.webkitRequestFullscreen;
          if (requestFS) await requestFS.call(videoWrap);
        }
      } else {
        const exitFS = document.exitFullscreen || document.webkitExitFullscreen;
        if (exitFS) await exitFS.call(document);
      }
    } catch(e) {}
  }
  fsBtn.addEventListener('click', toggleFullscreen);
  bdayVideo.addEventListener('error', () => videoFallback.classList.add('show'));
})();
</script>
</body>
</html>
